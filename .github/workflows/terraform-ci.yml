name: terraform-ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check changelog was updated
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            RANGE="${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}"
          elif [[ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            RANGE="${{ github.event.before }}...${{ github.sha }}"
          else
            echo "Initial push detected; skipping changelog diff check."
            exit 0
          fi

          echo "Checking diff range: ${RANGE}"

          if git diff --name-only "${RANGE}" | grep -qx 'CHANGELOG.md'; then
            echo "CHANGELOG.md was updated."
            exit 0
          fi

          echo "CHANGELOG.md must be updated for every change."
          exit 1

  required-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required files
        shell: bash
        run: |
          set -euo pipefail

          missing=0

          check_file() {
            local path="$1"
            if [[ ! -f "$path" ]]; then
              echo "Missing required file: $path"
              missing=1
            fi
          }

          check_any_file() {
            local first="$1"
            local second="$2"
            if [[ ! -f "$first" && ! -f "$second" ]]; then
              echo "Missing required file: $first or $second"
              missing=1
            fi
          }

          check_file "README.md"
          check_file "CHANGELOG.md"

          for module_dir in modules/*/*; do
            [[ -d "$module_dir" ]] || continue
            check_file "$module_dir/README.md"
            check_any_file "$module_dir/.terraform-docs.yml" "$module_dir/.terraform-docs.yaml"
          done

          for example_dir in examples/*; do
            [[ -d "$example_dir" ]] || continue
            check_file "$example_dir/README.md"
            check_file "$example_dir/main.tf"
            check_file "$example_dir/provider.tf"
            check_file "$example_dir/variables.tf"
          done

          if [[ "$missing" -ne 0 ]]; then
            echo "Required file validation failed."
            exit 1
          fi

          echo "All required files are present."

  terraform-fmt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Check formatting
        run: terraform fmt -check -recursive
