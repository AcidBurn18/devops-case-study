name: terraform-ci

on:
  pull_request:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate changelog format when changed
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            RANGE="${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}"
          elif [[ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            RANGE="${{ github.event.before }}...${{ github.sha }}"
          else
            echo "Initial push detected; skipping changelog diff check."
            exit 0
          fi

          echo "Checking diff range: ${RANGE}"

          if ! git diff --name-only "${RANGE}" | grep -qx 'CHANGELOG.md'; then
            echo "CHANGELOG.md was not changed; skipping format validation."
            exit 0
          fi

          grep -Eq '^## \[[0-9]+\.[0-9]+\.[0-9]+\]- [0-9]{2}/[0-9]{2}/[0-9]{4}$' CHANGELOG.md || {
            echo "CHANGELOG.md must include a version header like: ## [x.x.x]- MM/DD/YYYY"
            exit 1
          }

          grep -q '^## Added$' CHANGELOG.md || {
            echo "CHANGELOG.md must include: ## Added"
            exit 1
          }

          grep -q '^## Changed$' CHANGELOG.md || {
            echo "CHANGELOG.md must include: ## Changed"
            exit 1
          }

          grep -q '^## Fixed$' CHANGELOG.md || {
            echo "CHANGELOG.md must include: ## Fixed"
            exit 1
          }

          echo "CHANGELOG.md format is valid."

  required-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required files
        shell: bash
        run: |
          set -euo pipefail

          missing=0

          check_file() {
            local path="$1"
            if [[ ! -f "$path" ]]; then
              echo "Missing required file: $path"
              missing=1
            fi
          }

          check_any_file() {
            local first="$1"
            local second="$2"
            if [[ ! -f "$first" && ! -f "$second" ]]; then
              echo "Missing required file: $first or $second"
              missing=1
            fi
          }

          check_file "README.md"
          check_file "CHANGELOG.md"

          for module_dir in modules/*/*; do
            [[ -d "$module_dir" ]] || continue
            check_file "$module_dir/README.md"
            check_any_file "$module_dir/.terraform-docs.yml" "$module_dir/.terraform-docs.yaml"
          done

          for example_dir in examples/*; do
            [[ -d "$example_dir" ]] || continue
            check_file "$example_dir/README.md"
            check_file "$example_dir/main.tf"
            check_file "$example_dir/provider.tf"
            check_file "$example_dir/variables.tf"
          done

          if [[ "$missing" -ne 0 ]]; then
            echo "Required file validation failed."
            exit 1
          fi

          echo "All required files are present."

  terraform-fmt:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Run terraform fmt
        run: terraform fmt -recursive

      - name: Commit formatted files
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet; then
            echo "No formatting changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: apply terraform fmt"
          git push
